name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        run: |
          docker build -t move-stretch-builder -f scripts/Dockerfile scripts/
          docker run --rm -v "$PWD:/build" -w /build move-stretch-builder ./scripts/build.sh
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/stretch-module.tar.gz
